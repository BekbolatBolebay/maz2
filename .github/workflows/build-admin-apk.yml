name: Build Admin APK

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'
      - '.github/workflows/build-admin-apk.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd admin
          npm install
          
      - name: Build unsigned Release APK
        run: |
          cd admin/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          cd admin/android/app/build/outputs/apk/release
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -dname "CN=Mazir, OU=Admin, O=Mazir, L=Almaty, C=KZ" -storepass password -keypass password
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          $APKSIGNER sign --ks release.jks --ks-pass pass:password --ks-key-alias release --key-pass pass:password --out app-release-signed.apk app-release-unsigned.apk

      - name: Commit and Host APK on Site
        run: |
          mkdir -p admin/public
          cp admin/android/app/build/outputs/apk/release/app-release-signed.apk admin/public/mazir-admin.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/public/mazir-admin.apk
          git commit -m "chore: host latest Android App on site [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF}

