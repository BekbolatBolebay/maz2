name: Build Admin APK

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'
      - '.github/workflows/build-admin-apk.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd admin
          npm install
          
      - name: Sync Capacitor
        run: |
          cd admin
          mkdir -p out
          touch out/index.html
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd admin/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: mazir-admin-app
          path: admin/android/app/build/outputs/apk/debug/app-debug.apk
